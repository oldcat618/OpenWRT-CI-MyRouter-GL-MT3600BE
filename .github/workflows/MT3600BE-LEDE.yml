name: MT3600BE-LEDE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner information
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          lsb_release -a || true
          uname -a

      - name: Prepare build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update
          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf \
            haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full \
            patch pkgconf python2.7 python3 python3-pip python3-setuptools qemu-utils \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl \
            unzip vim wget xmlto xsltproc xxd zlib1g-dev

      - name: Clean disk space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo docker image prune -af || true
          df -h

      - name: Clone LEDE source
        run: |
          git clone --depth=1 https://github.com/coolsnowwolf/lede.git openwrt
          cd openwrt
          echo "SOURCE_REPO=coolsnowwolf/lede" >> $GITHUB_ENV
          echo "SOURCE_BRANCH=master" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
          echo "SOURCE_DATE_EPOCH=$(date +%s)" >> $GITHUB_ENV

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom settings
        run: |
          if [ -f Scripts/Settings.sh ]; then
            chmod +x Scripts/Settings.sh
            cd openwrt
            bash ../Scripts/Settings.sh
          else
            echo "Scripts/Settings.sh not found, skip."
          fi

      - name: Load custom config
        run: |
          if [ ! -f Config/MT3600BE.txt ]; then
            echo "Config/MT3600BE.txt not found!"
            exit 1
          fi
          cat Config/MT3600BE.txt >> openwrt/.config
          cd openwrt
          make defconfig
          echo "========== .config (filtered) =========="
          grep -E "CONFIG_TARGET_|CONFIG_PACKAGE_luci" .config || true

      - name: Download packages
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s

      - name: Build firmware
        run: |
          cd openwrt
          make -j"$(nproc)" V=s

      - name: Prepare artifact files
        run: |
          mkdir -p upload
          find openwrt/bin/targets/ -type f \
            \( -name "*.bin" -o -name "*.itb" -o -name "*.img.gz" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" \) \
            -exec cp -f {} upload/ \;
          ls -lah upload || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MT3600BE-LEDE-${{ env.BUILD_DATE }}
          path: upload/
          if-no-files-found: error
