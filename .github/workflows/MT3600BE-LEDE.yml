name: MT3600BE-LEDE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner information
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          lsb_release -a || true
          uname -a
          df -h

      - name: Clean disk space before build
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo docker image prune -af || true
          df -h

      - name: Prepare build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-pip \
            python3-setuptools \
            rsync \
            swig \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            qemu-utils \
            ccache \
            cmake \
            ninja-build \
            libelf-dev \
            xsltproc \
            libc6-dev-i386 \
            subversion
          df -h

      - name: Clone LEDE source
        run: |
          git clone --depth=1 https://github.com/coolsnowwolf/lede.git openwrt
          cd openwrt
          echo "SOURCE_REPO=coolsnowwolf/lede" >> $GITHUB_ENV
          echo "SOURCE_BRANCH=master" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
          echo "SOURCE_DATE_EPOCH=$(date +%s)" >> $GITHUB_ENV

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom settings
        run: |
          if [ -f Scripts/Settings.sh ]; then
            chmod +x Scripts/Settings.sh
            cd openwrt
            bash ../Scripts/Settings.sh
          else
            echo "Scripts/Settings.sh not found, skip."
          fi

      - name: Load custom config
        run: |
          if [ ! -f Config/MT3600BE.txt ]; then
            echo "Config/MT3600BE.txt not found!"
            exit 1
          fi
          cat Config/MT3600BE.txt >> openwrt/.config
          cd openwrt
          make defconfig
          echo "========== .config (filtered) =========="
          grep -E "CONFIG_TARGET_|CONFIG_PACKAGE_luci" .config || true

      - name: Download packages
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s

      - name: Build firmware
        run: |
          cd openwrt
          make -j"$(nproc)" V=s

      - name: Prepare artifact files
        run: |
          mkdir -p upload
          find openwrt/bin/targets/ -type f \
            \( -name "*.bin" -o -name "*.itb" -o -name "*.img.gz" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" \) \
            -exec cp -f {} upload/ \;
          ls -lah upload || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MT3600BE-LEDE-${{ env.BUILD_DATE }}
          path: upload/
          if-no-files-found: error
