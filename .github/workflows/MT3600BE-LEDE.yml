name: MT3600BE-LEDE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare build environment
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync \
            swig unzip zlib1g-dev file wget curl qemu-utils ccache cmake ninja-build \
            libelf-dev xsltproc

      - name: Clone LEDE source
        run: |
          git clone --depth=1 https://github.com/coolsnowwolf/lede.git openwrt
          cd openwrt
          echo "SOURCE_DATE_EPOCH=$(date +%s)" >> $GITHUB_ENV

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom settings
        run: |
          chmod +x Scripts/Settings.sh
          cd openwrt
          bash ../Scripts/Settings.sh

      - name: Load custom config
        run: |
          cat Config/MT3600BE.txt >> openwrt/.config
          cd openwrt
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Prepare artifacts
        run: |
          mkdir -p upload
          find openwrt/bin/targets/ -type f \
            \( -name "*.bin" -o -name "*.itb" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" \) \
            -exec cp {} upload/ \;

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MT3600BE-LEDE-firmware
          path: upload/
