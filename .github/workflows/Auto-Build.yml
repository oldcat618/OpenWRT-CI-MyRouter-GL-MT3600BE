name: Auto-Build

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  call-core:
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      WRT_NAME: GL-MT3600BE-AUTO
      WRT_REPO: coolsnowwolf/lede
      WRT_BRANCH: master
      WRT_COMMIT: 6c3097f
      DEVICE_CONFIG: Config/MT3600BE-MINIMAL.txt
      RELEASE_TAG: mt3600be-auto
      ENABLE_RELEASE: true
      ENABLE_ARTIFACT: true
      BUILD_THREADS: '4'
    secrets: inherit
